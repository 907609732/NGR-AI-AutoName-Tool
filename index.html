<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI辅助UI切图命名工具</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <button class="back-button hidden" id="backButton" type="button" aria-label="返回主界面">←</button>
        <div>
          <h1>AI辅助UI切图命名工具</h1>
          <p id="pageHint">批量整理 UI 切图名称，让文件名保持统一、清楚、可追踪。</p>
        </div>
      </header>

      <main>
        <section class="home-view view active" id="homeView">
          <button class="entry-button" id="rulesEntry" type="button">
            <span>命名规则</span>
            <small>配置前缀、工程名、分隔符与常用标签</small>
          </button>
          <button class="entry-button primary" id="workEntry" type="button">
            <span>开始命名</span>
            <small>上传切图和参考图，批量生成并导出名称</small>
          </button>
        </section>

        <section class="view rules-view" id="rulesView">
          <div class="section-head">
            <h2>命名规则</h2>
            <p>这些设置会自动保存，并在命名流程中作为全局前缀使用。</p>
          </div>

          <form id="rulesForm" class="rules-grid">
            <label class="wide">
              <span>选择方案</span>
              <select id="schemeSelect"></select>
            </label>
            <label>
              <span>方案名称</span>
              <input id="schemeName" type="text" placeholder="例如：默认方案" />
            </label>
            <label>
              <span>固定前缀</span>
              <input id="basePrefix" type="text" placeholder="T_UI" />
            </label>
            <label>
              <span>工程名</span>
              <input id="projectName" type="text" placeholder="请输入当前项目名称" />
            </label>
            <label>
              <span>分隔符</span>
              <input id="separator" type="text" maxlength="4" placeholder="_" />
            </label>
            <label class="wide">
              <span>常用标签</span>
              <input id="tags" type="text" placeholder="BG, Button, Hover, Normal, Icon, Module" />
            </label>
          </form>

          <div class="knowledge-panel">
            <div class="section-head compact-head">
              <div>
                <h2>命名知识库</h2>
                <p>配置团队常用页面、组件、状态和关键词匹配规则，AI 推荐会优先参考这里。</p>
              </div>
            </div>
            <div class="knowledge-grid">
              <label>
                <span class="label-with-help">
                  页面词库
                  <button class="help-button" type="button" aria-label="页面词库说明" data-tooltip="填写常见页面英文名，例如 Home、Login、Profile。AI 和本地推荐会用它识别文件属于哪个页面。">?</button>
                </span>
                <textarea id="pageTerms" rows="4" placeholder="Home&#10;Login&#10;Profile&#10;Settings"></textarea>
              </label>
              <label>
                <span class="label-with-help">
                  组件词库
                  <button class="help-button" type="button" aria-label="组件词库说明" data-tooltip="填写常见切图类型，例如 BG、Button、Icon、Banner、Module。用于判断图片是背景、按钮、图标还是模块。">?</button>
                </span>
                <textarea id="componentTerms" rows="4" placeholder="BG&#10;Button&#10;Icon&#10;Banner&#10;Module"></textarea>
              </label>
              <label>
                <span class="label-with-help">
                  状态词库
                  <button class="help-button" type="button" aria-label="状态词库说明" data-tooltip="填写交互状态，例如 Normal、Hover、Active、Disabled。适合按钮、图标等有多状态切图的命名。">?</button>
                </span>
                <textarea id="stateTerms" rows="4" placeholder="Normal&#10;Hover&#10;Active&#10;Disabled"></textarea>
              </label>
              <label>
                <span class="label-with-help">
                  文件名匹配规则
                  <button class="help-button" type="button" aria-label="文件名匹配规则说明" data-tooltip="按“关键词=英文名”填写，例如 登录=Login、按钮=Button。原始中文文件名命中关键词后，会自动翻译成英文命名。">?</button>
                </span>
                <textarea id="filenameRules" rows="4" placeholder="首页=Home&#10;登录=Login&#10;按钮=Button&#10;悬浮=Hover"></textarea>
              </label>
            </div>
          </div>

          <div class="knowledge-panel ai-panel">
            <div class="section-head compact-head">
              <div>
                <h2>AI 接入</h2>
                <p>填写后运行命名会调用视觉模型；留空则使用本地知识库推荐。</p>
              </div>
            </div>
            <div class="ai-grid">
              <label>
                <span>OpenAI API Key</span>
                <input id="openaiApiKey" type="password" placeholder="sk-..." autocomplete="off" />
              </label>
              <label>
                <span>模型</span>
                <input id="openaiModel" type="text" placeholder="gpt-4.1-mini" />
              </label>
            </div>
          </div>

          <div class="knowledge-panel import-export-panel">
            <div class="section-head compact-head">
              <div>
                <h2>方案模板</h2>
                <p>导出为 Excel 可打开的 CSV 模板，批量修改后可再导入为当前方案。</p>
              </div>
            </div>
            <div class="template-actions">
              <button id="exportSchemeTemplate" class="ghost-action" type="button">导出当前方案模板</button>
              <label class="file-action">
                <span>导入方案模板</span>
                <input id="importSchemeTemplate" type="file" accept=".csv,text/csv" />
              </label>
            </div>
          </div>

          <div class="preview-line">
            <span>命名预览</span>
            <strong id="prefixPreview">T_UI_工程名_AI自动生成名称</strong>
          </div>

          <div class="action-row">
            <button id="saveRules" class="primary-action" type="button">保存规则</button>
            <button id="saveAsScheme" class="ghost-action" type="button">保存为方案</button>
            <button id="resetRules" class="ghost-action" type="button">恢复默认</button>
          </div>
        </section>

        <section class="view work-view" id="workView">
          <div class="work-toolbar">
            <div>
              <h2>开始命名</h2>
              <p id="activeRuleText">当前规则：T_UI_工程名_</p>
            </div>
            <div class="toolbar-actions">
              <button id="runNaming" class="primary-action" type="button">运行 AI 命名</button>
              <button id="exportFiles" class="success-action" type="button">下载全部命名完成图片</button>
            </div>
          </div>

          <div class="job-config">
            <label>
              <span>当前界面工程名</span>
              <input id="workProjectName" type="text" placeholder="请输入本套界面的工程名" />
            </label>
          </div>

          <div class="upload-grid">
            <label class="upload-panel">
              <span>上传切图文件夹</span>
              <small>支持 PNG、JPG、JPEG、WebP、GIF、SVG</small>
              <input id="folderInput" type="file" webkitdirectory multiple accept="image/*,.svg" />
            </label>
            <label class="upload-panel">
              <span>补充上传单张图片</span>
              <small>可追加遗漏的切图</small>
              <input id="singleInput" type="file" multiple accept="image/*,.svg" />
            </label>
            <label class="upload-panel reference">
              <span>上传参考效果图</span>
              <small>用于后续接入真实 AI 识别</small>
              <input id="referenceInput" type="file" accept="image/*" />
            </label>
          </div>

          <div class="reference-preview hidden" id="referencePreviewWrap">
            <img id="referencePreview" alt="参考效果图预览" />
            <div>
              <strong id="referenceName"></strong>
              <span>参考图已载入</span>
            </div>
          </div>

          <div class="batch-tools list-batch-tools">
            <label>
              <span>批量追加后缀</span>
              <input id="batchSuffix" type="text" placeholder="例如：Hover" />
            </label>
            <button id="applySuffix" class="ghost-action" type="button">应用到选中</button>
            <button id="removeSelected" class="danger-action" type="button">删除选中图片</button>
          </div>

          <div class="workspace">
            <aside class="asset-list">
              <div class="list-head">
                <strong>待处理图片</strong>
                <span id="fileCount">0 张</span>
              </div>
              <div id="assetList" class="asset-list-body empty-state">请先上传切图文件夹</div>
            </aside>
          </div>
        </section>
      </main>

      <div id="toast" class="toast hidden" role="status"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
